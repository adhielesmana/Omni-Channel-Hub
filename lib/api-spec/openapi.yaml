openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: OmniChat omnichannel messaging platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User management
  - name: departments
    description: Department management
  - name: channels
    description: Channel management
  - name: contacts
    description: Contact management
  - name: conversations
    description: Conversation management
  - name: messages
    description: Message management
  - name: webhooks
    description: Meta webhook endpoints
  - name: stats
    description: Dashboard statistics
  - name: auth
    description: Authentication & password management
  - name: whatsapp-blast
    description: WhatsApp blast messaging

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Users
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateUserResponse"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    post:
      operationId: resetUserPassword
      tags: [users]
      summary: Reset a user's password (admin). Generates a new random password.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Password reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResetPasswordResponse"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Departments
  /departments:
    get:
      operationId: listDepartments
      tags: [departments]
      summary: List all departments
      responses:
        "200":
          description: List of departments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Department"
    post:
      operationId: createDepartment
      tags: [departments]
      summary: Create a department
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DepartmentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Department"

  /departments/{id}:
    get:
      operationId: getDepartment
      tags: [departments]
      summary: Get a department
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Department
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Department"
        "404":
          description: Not found
    patch:
      operationId: updateDepartment
      tags: [departments]
      summary: Update a department
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DepartmentUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Department"
    delete:
      operationId: deleteDepartment
      tags: [departments]
      summary: Delete a department
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Channels
  /channels:
    get:
      operationId: listChannels
      tags: [channels]
      summary: List all channels
      responses:
        "200":
          description: List of channels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Channel"
    post:
      operationId: createChannel
      tags: [channels]
      summary: Create a channel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChannelInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Channel"

  /channels/{id}:
    get:
      operationId: getChannel
      tags: [channels]
      summary: Get a channel
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Channel
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Channel"
        "404":
          description: Not found
    patch:
      operationId: updateChannel
      tags: [channels]
      summary: Update a channel
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChannelUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Channel"
    delete:
      operationId: deleteChannel
      tags: [channels]
      summary: Delete a channel
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Contacts
  /contacts:
    get:
      operationId: listContacts
      tags: [contacts]
      summary: List contacts
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: channelType
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of contacts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Contact"
    post:
      operationId: createContact
      tags: [contacts]
      summary: Create a contact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"

  /contacts/{id}:
    get:
      operationId: getContact
      tags: [contacts]
      summary: Get a contact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Contact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
        "404":
          description: Not found
    patch:
      operationId: updateContact
      tags: [contacts]
      summary: Update a contact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"

  # Conversations
  /conversations:
    get:
      operationId: listConversations
      tags: [conversations]
      summary: List conversations
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: channelId
          in: query
          schema:
            type: integer
        - name: departmentId
          in: query
          schema:
            type: integer
        - name: assignedAgentId
          in: query
          schema:
            type: integer
        - name: channelType
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"
    post:
      operationId: createConversation
      tags: [conversations]
      summary: Create a conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConversationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /conversations/{id}:
    get:
      operationId: getConversation
      tags: [conversations]
      summary: Get a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"
        "404":
          description: Not found
    patch:
      operationId: updateConversation
      tags: [conversations]
      summary: Update a conversation (assign agent, department, status)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConversationUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /conversations/{id}/assign:
    post:
      operationId: assignConversation
      tags: [conversations]
      summary: Assign conversation to an agent and/or department
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignmentInput"
      responses:
        "200":
          description: Assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /conversations/{id}/resolve:
    post:
      operationId: resolveConversation
      tags: [conversations]
      summary: Mark conversation as resolved
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /conversations/{id}/reopen:
    post:
      operationId: reopenConversation
      tags: [conversations]
      summary: Reopen a resolved conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reopened
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  # Messages
  /conversations/{conversationId}/messages:
    get:
      operationId: listMessages
      tags: [messages]
      summary: List messages in a conversation
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a message in a conversation
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "201":
          description: Sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  # Webhooks
  /webhooks/meta:
    get:
      operationId: verifyMetaWebhook
      tags: [webhooks]
      summary: Meta webhook verification (GET challenge)
      parameters:
        - name: hub.mode
          in: query
          schema:
            type: string
        - name: hub.verify_token
          in: query
          schema:
            type: string
        - name: hub.challenge
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Verification successful
    post:
      operationId: receiveMetaWebhook
      tags: [webhooks]
      summary: Receive Meta webhook events
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MetaWebhookPayload"
      responses:
        "200":
          description: Acknowledged

  # Stats / Dashboard
  # Auth
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Authenticate with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthLoginResponse"
        "401":
          description: Invalid credentials

  /auth/change-password:
    post:
      operationId: changePassword
      tags: [auth]
      summary: Change own password (authenticated)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordInput"
      responses:
        "200":
          description: Password changed
        "401":
          description: Invalid current password

  /stats/overview:
    get:
      operationId: getStatsOverview
      tags: [stats]
      summary: Dashboard overview stats
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
            format: date
          description: Filter start date (ISO 8601)
        - name: endDate
          in: query
          schema:
            type: string
            format: date
          description: Filter end date (ISO 8601)
      responses:
        "200":
          description: Overview statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsOverview"

  /stats/conversations-by-channel:
    get:
      operationId: getConversationsByChannel
      tags: [stats]
      summary: Conversation counts grouped by channel type
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
            format: date
          description: Filter start date (ISO 8601)
        - name: endDate
          in: query
          schema:
            type: string
            format: date
          description: Filter end date (ISO 8601)
      responses:
        "200":
          description: Counts by channel
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChannelCount"

  /stats/conversations-by-department:
    get:
      operationId: getConversationsByDepartment
      tags: [stats]
      summary: Conversation counts grouped by department
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
            format: date
          description: Filter start date (ISO 8601)
        - name: endDate
          in: query
          schema:
            type: string
            format: date
          description: Filter end date (ISO 8601)
      responses:
        "200":
          description: Counts by department
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DepartmentCount"

  /stats/agent-workload:
    get:
      operationId: getAgentWorkload
      tags: [stats]
      summary: Per-agent conversation workload
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
            format: date
          description: Filter start date (ISO 8601)
        - name: endDate
          in: query
          schema:
            type: string
            format: date
          description: Filter end date (ISO 8601)
      responses:
        "200":
          description: Agent workload data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentWorkload"

  /stats/periods:
    get:
      operationId: getStatsPeriods
      tags: [stats]
      summary: List available monthly cut-off periods
      responses:
        "200":
          description: List of available periods
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StatsPeriod"

  # WhatsApp Blast
  /whatsapp-blasts:
    get:
      operationId: listWhatsappBlasts
      tags: [whatsapp-blast]
      summary: List WhatsApp blast messages (paginated, searchable)
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of blast messages
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/WhatsappBlastWithRecipients"
                  total:
                    type: integer
                  page:
                    type: integer
                  limit:
                    type: integer
    post:
      operationId: createWhatsappBlast
      tags: [whatsapp-blast]
      summary: Create a manual WhatsApp blast
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWhatsappBlastInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhatsappBlast"
        "400":
          description: Validation error

  /whatsapp-blasts/{id}:
    get:
      operationId: getWhatsappBlast
      tags: [whatsapp-blast]
      summary: Get a blast with recipient details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Blast detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhatsappBlastDetail"
        "404":
          description: Not found
    delete:
      operationId: cancelWhatsappBlast
      tags: [whatsapp-blast]
      summary: Cancel a pending blast
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Cancelled
        "404":
          description: Not found

  /whatsapp-blasts/templates:
    get:
      operationId: listWhatsappBlastTemplates
      tags: [whatsapp-blast]
      summary: Fetch approved WhatsApp templates from Meta
      parameters:
        - name: channelId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of approved templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WhatsAppTemplate"

  /whatsapp-blasts/settings:
    get:
      operationId: getWhatsappBlastSettings
      tags: [whatsapp-blast]
      summary: Get blast rate limit settings
      responses:
        "200":
          description: Blast settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhatsappBlastSettings"
    put:
      operationId: updateWhatsappBlastSettings
      tags: [whatsapp-blast]
      summary: Update blast rate limit settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WhatsappBlastSettingsInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhatsappBlastSettings"

  /external/whatsapp-blast:
    post:
      operationId: externalCreateWhatsappBlast
      tags: [whatsapp-blast]
      summary: Receive blast from external app (different content per destination)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExternalWhatsappBlastInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhatsappBlast"
        "400":
          description: Validation error
        "401":
          description: Invalid API key

  /external/whatsapp-blast/{id}:
    get:
      operationId: externalGetWhatsappBlastStatus
      tags: [whatsapp-blast]
      summary: Check external blast status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Blast status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhatsappBlast"
        "404":
          description: Not found

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # Users
    User:
      type: object
      required: [id, email, name, role, isActive, createdAt]
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [admin, supervisor, agent]
        departmentId:
          type: ["integer", "null"]
        avatarUrl:
          type: ["string", "null"]
        isActive:
          type: boolean
        createdAt:
          type: string

    UserInput:
      type: object
      required: [email, name, role]
      properties:
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [admin, supervisor, agent]
        departmentId:
          type: ["integer", "null"]
        avatarUrl:
          type: ["string", "null"]
        password:
          type: string
          description: If omitted, a random password is generated and returned in the response

    UserUpdate:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
          enum: [admin, supervisor, agent]
        departmentId:
          type: ["integer", "null"]
        avatarUrl:
          type: ["string", "null"]
        isActive:
          type: boolean

    # Departments
    Department:
      type: object
      required: [id, name, routingMode, isActive, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        routingMode:
          type: string
          enum: [manual, round_robin]
        isActive:
          type: boolean
        memberCount:
          type: integer
        createdAt:
          type: string

    DepartmentInput:
      type: object
      required: [name, routingMode]
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]
        routingMode:
          type: string
          enum: [manual, round_robin]

    DepartmentUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]
        routingMode:
          type: string
          enum: [manual, round_robin]
        isActive:
          type: boolean

    # Channels
    Channel:
      type: object
      required: [id, name, channelType, isActive, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        channelType:
          type: string
          enum: [whatsapp, instagram, facebook]
        externalId:
          type: ["string", "null"]
        wabaId:
          type: ["string", "null"]
        phoneNumber:
          type: ["string", "null"]
        pageId:
          type: ["string", "null"]
        accessToken:
          type: ["string", "null"]
        webhookVerifyToken:
          type: ["string", "null"]
        isActive:
          type: boolean
        createdAt:
          type: string

    ChannelInput:
      type: object
      required: [name, channelType]
      properties:
        name:
          type: string
        channelType:
          type: string
          enum: [whatsapp, instagram, facebook]
        externalId:
          type: ["string", "null"]
        wabaId:
          type: ["string", "null"]
        phoneNumber:
          type: ["string", "null"]
        pageId:
          type: ["string", "null"]
        accessToken:
          type: ["string", "null"]
        webhookVerifyToken:
          type: ["string", "null"]

    ChannelUpdate:
      type: object
      properties:
        name:
          type: string
        externalId:
          type: ["string", "null"]
        wabaId:
          type: ["string", "null"]
        phoneNumber:
          type: ["string", "null"]
        pageId:
          type: ["string", "null"]
        accessToken:
          type: ["string", "null"]
        webhookVerifyToken:
          type: ["string", "null"]
        isActive:
          type: boolean

    # Contacts
    Contact:
      type: object
      required: [id, name, channelType, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        channelType:
          type: string
          enum: [whatsapp, instagram, facebook]
        externalId:
          type: string
        customFields:
          type: ["string", "null"]
        createdAt:
          type: string

    ContactInput:
      type: object
      required: [name, channelType, externalId]
      properties:
        name:
          type: string
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        channelType:
          type: string
          enum: [whatsapp, instagram, facebook]
        externalId:
          type: string
        customFields:
          type: ["string", "null"]

    ContactUpdate:
      type: object
      properties:
        name:
          type: string
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        customFields:
          type: ["string", "null"]

    # Conversations
    Conversation:
      type: object
      required: [id, status, channelType, createdAt, updatedAt]
      properties:
        id:
          type: integer
        contactId:
          type: integer
        channelId:
          type: integer
        channelType:
          type: string
          enum: [whatsapp, instagram, facebook]
        departmentId:
          type: ["integer", "null"]
        assignedAgentId:
          type: ["integer", "null"]
        status:
          type: string
          enum: [open, pending, resolved, snoozed]
        subject:
          type: ["string", "null"]
        lastMessageAt:
          type: ["string", "null"]
        unreadCount:
          type: integer
        contact:
          $ref: "#/components/schemas/Contact"
        channel:
          $ref: "#/components/schemas/Channel"
        assignedAgent:
          type: object
          nullable: true
          properties:
            id: { type: integer }
            name: { type: string }
            avatarUrl: { type: ["string", "null"] }
        department:
          type: object
          nullable: true
          properties:
            id: { type: integer }
            name: { type: string }
        lastMessage:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    ConversationInput:
      type: object
      required: [contactId, channelId, channelType]
      properties:
        contactId:
          type: integer
        channelId:
          type: integer
        channelType:
          type: string
          enum: [whatsapp, instagram, facebook]
        departmentId:
          type: ["integer", "null"]
        assignedAgentId:
          type: ["integer", "null"]
        subject:
          type: ["string", "null"]

    ConversationUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [open, pending, resolved, snoozed]
        departmentId:
          type: ["integer", "null"]
        assignedAgentId:
          type: ["integer", "null"]
        subject:
          type: ["string", "null"]

    AssignmentInput:
      type: object
      properties:
        departmentId:
          type: ["integer", "null"]
        assignedAgentId:
          type: ["integer", "null"]

    # Messages
    Message:
      type: object
      required: [id, conversationId, direction, contentType, createdAt]
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        senderType:
          type: string
          enum: [contact, agent, system]
        senderId:
          type: ["integer", "null"]
        direction:
          type: string
          enum: [inbound, outbound]
        contentType:
          type: string
          enum: [text, image, video, audio, document, location, sticker, template, note]
        content:
          type: ["string", "null"]
        mediaUrl:
          type: ["string", "null"]
        mediaType:
          type: ["string", "null"]
        isRead:
          type: boolean
        externalMessageId:
          type: ["string", "null"]
        metadata:
          type: ["string", "null"]
        senderName:
          type: ["string", "null"]
        deliveryStatus:
          type: string
          enum: [pending, sent, delivered, read, failed]
        createdAt:
          type: string

    MessageInput:
      type: object
      required: [contentType]
      properties:
        contentType:
          type: string
          enum: [text, image, video, audio, document, location, sticker, template, note]
        content:
          type: ["string", "null"]
        mediaUrl:
          type: ["string", "null"]
        mediaType:
          type: ["string", "null"]
        senderId:
          type: ["integer", "null"]
        senderName:
          type: ["string", "null"]

    # Webhooks
    MetaWebhookPayload:
      type: object
      required: [object]
      properties:
        object:
          type: string
        entry:
          type: array
          items:
            type: object

    # Stats
    StatsOverview:
      type: object
      required: [totalConversations, openConversations, pendingConversations, resolvedConversations, totalContacts, totalAgents, avgResponseTime]
      properties:
        totalConversations:
          type: integer
        openConversations:
          type: integer
        pendingConversations:
          type: integer
        resolvedConversations:
          type: integer
        totalContacts:
          type: integer
        totalAgents:
          type: integer
        avgResponseTime:
          type: number
        unassignedConversations:
          type: integer

    ChannelCount:
      type: object
      required: [channelType, count]
      properties:
        channelType:
          type: string
        count:
          type: integer

    DepartmentCount:
      type: object
      required: [departmentId, departmentName, count]
      properties:
        departmentId:
          type: integer
        departmentName:
          type: string
        count:
          type: integer

    # Auth & Password
    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthLoginResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    ChangePasswordInput:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
          minLength: 6

    ResetPasswordResponse:
      type: object
      required: [temporaryPassword]
      properties:
        temporaryPassword:
          type: string

    CreateUserResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: "#/components/schemas/User"
        temporaryPassword:
          type: string
          description: Returned only when password was auto-generated

    AgentWorkload:
      type: object
      required: [agentId, agentName, openCount, resolvedCount]
      properties:
        agentId:
          type: integer
        agentName:
          type: string
        avatarUrl:
          type: ["string", "null"]
        openCount:
          type: integer
        resolvedCount:
          type: integer

    StatsPeriod:
      type: object
      required: [label, startDate, endDate]
      properties:
        label:
          type: string
        startDate:
          type: string
        endDate:
          type: string

    # WhatsApp Blast
    WhatsappBlast:
      type: object
      required: [id, name, channelId, templateName, templateLanguage, source, totalRecipients, sentCount, deliveredCount, failedCount, status, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        channelId:
          type: integer
        templateName:
          type: string
        templateLanguage:
          type: string
        templateParams:
          type: ["string", "null"]
        source:
          type: string
          enum: [manual, external]
        createdByUserId:
          type: ["integer", "null"]
        createdByUserName:
          type: ["string", "null"]
        externalApiKey:
          type: ["string", "null"]
        externalSourceIp:
          type: ["string", "null"]
        scheduledAt:
          type: ["string", "null"]
        startedAt:
          type: ["string", "null"]
        completedAt:
          type: ["string", "null"]
        totalRecipients:
          type: integer
        sentCount:
          type: integer
        deliveredCount:
          type: integer
        failedCount:
          type: integer
        status:
          type: string
          enum: [pending, processing, completed, failed, cancelled]
        createdAt:
          type: string
        updatedAt:
          type: string

    WhatsappBlastWithRecipients:
      allOf:
        - $ref: "#/components/schemas/WhatsappBlast"
        - type: object
          properties:
            recipients:
              type: array
              items:
                $ref: "#/components/schemas/WhatsappBlastRecipient"

    WhatsappBlastRecipient:
      type: object
      required: [id, blastId, phone, status, createdAt]
      properties:
        id:
          type: integer
        blastId:
          type: integer
        contactId:
          type: ["integer", "null"]
        phone:
          type: string
        templateParams:
          type: ["string", "null"]
        content:
          type: ["string", "null"]
        status:
          type: string
          enum: [queued, pending, sent, delivered, failed, processing]
        externalMessageId:
          type: ["string", "null"]
        errorMessage:
          type: ["string", "null"]
        sentAt:
          type: ["string", "null"]
        createdAt:
          type: string

    CreateWhatsappBlastInput:
      type: object
      required: [name, channelId, templateName, templateLanguage]
      properties:
        name:
          type: string
        channelId:
          type: integer
        templateName:
          type: string
        templateLanguage:
          type: string
        templateParams:
          type: array
          items:
            type: string
        scheduledAt:
          type: ["string", "null"]
        contactIds:
          type: array
          items:
            type: integer
          description: Specific contacts to blast. If omitted, targets all WhatsApp contacts.

    ExternalWhatsappBlastInput:
      type: object
      required: [channelId, recipients]
      properties:
        channelId:
          type: integer
        recipients:
          type: array
          items:
            type: object
            required: [phone]
            properties:
              phone:
                type: string
              templateParams:
                type: array
                items:
                  type: string
              content:
                type: ["string", "null"]
            description: Recipient with optional per-destination params/content

    WhatsappBlastDetail:
      type: object
      properties:
        blast:
          $ref: "#/components/schemas/WhatsappBlast"
        recipients:
          type: array
          items:
            $ref: "#/components/schemas/WhatsappBlastRecipient"
        total:
          type: integer

    WhatsAppTemplate:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        language:
          type: string
        status:
          type: string
        category:
          type: string
        components:
          type: array
          items:
            type: object
        channelId:
          type: integer
        channelName:
          type: string

    WhatsappBlastSettings:
      type: object
      properties:
        batchSize:
          type: integer
        delayBetweenBatchesMs:
          type: integer
        maxRetries:
          type: integer

    WhatsappBlastSettingsInput:
      type: object
      properties:
        batchSize:
          type: integer
        delayBetweenBatchesMs:
          type: integer
        maxRetries:
          type: integer
